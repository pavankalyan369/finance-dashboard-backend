server:
  port: 8080

spring:
  application:
    name: finance-dashboard

  datasource:
    url: jdbc:postgresql://localhost:5432/finance_dashboard
    username: postgres
    password: pavan
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true




  # EMAIL CONFIG (THIS FIXES YOUR ERROR)
  mail:
    host: smtp.gmail.com
    port: 587

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: my-super-secret-key-that-is-at-least-32-characters-long
  expiration: 86400000